name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: release_tag
        shell: bash
        run: |
          # tag push 事件的 ref 格式固定为 refs/tags/<tag>，这里提取 Release 名称。
          echo "tag_name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is on main
        shell: bash
        run: |
          # 只允许 main 历史上的 v* tag 发布，避免临时分支误触发 Release。
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-tauri:
    name: Build ${{ matrix.platform.name }}
    needs: verify-tag
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest
          - name: Linux
            runner: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-latest'
        shell: bash
        run: |
          # Tauri Linux 打包依赖 WebKitGTK、AppIndicator 和基础构建工具。
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          # 缓存 Bun 下载包，node_modules 仍由 lockfile 重新展开，避免跨平台产物污染。
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # 缓存 Cargo registry/git 与 Tauri release target，显著减少重复 tag 构建时间。
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

      - name: Build Tauri bundles
        run: bun run tauri build

      - name: Collect release artifacts
        shell: bash
        run: |
          # 统一收集 Tauri 产物，后续由 upload-artifact 传给发布任务。
          mkdir -p release-artifacts
          find src-tauri/target/release/bundle -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" \
          \) -exec cp {} release-artifacts/ \;

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: encode-lab-${{ matrix.platform.name }}
          path: release-artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - verify-tag
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-tag.outputs.tag_name }}
          name: Encode Lab ${{ needs.verify-tag.outputs.tag_name }}
          draft: false
          prerelease: ${{ contains(needs.verify-tag.outputs.tag_name, '-') }}
          generate_release_notes: true
          files: release-artifacts/*
