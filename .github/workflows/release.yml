name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
      app_version: ${{ steps.release_tag.outputs.app_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag name
        id: release_tag
        shell: bash
        run: |
          # tag push 事件的 ref 格式固定为 refs/tags/<tag>，这里提取 Release 名称。
          tag_name="${GITHUB_REF#refs/tags/}"
          if [[ ! "$tag_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-beta)?$ ]]; then
            echo "Release tag must match vx.x.x or vx.x.x-beta" >&2
            exit 1
          fi
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "app_version=${tag_name#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag is on main
        shell: bash
        run: |
          # 只允许 main 历史上的 v* tag 发布，避免临时分支误触发 Release。
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-tauri:
    name: Build ${{ matrix.platform.name }}
    needs: verify-tag
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            args: ""
          - name: Windows
            runner: windows-latest
            args: ""
          - name: Linux
            runner: ubuntu-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-latest'
        shell: bash
        run: |
          # Tauri Linux 打包依赖 WebKitGTK、AppIndicator 和基础构建工具。
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          # 缓存 Bun 下载包，node_modules 仍由 lockfile 重新展开，避免跨平台产物污染。
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # 缓存 Cargo registry/git 与 Tauri release target，显著减少重复 tag 构建时间。
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ needs.verify-tag.outputs.tag_name }}
          releaseName: Encode Lab ${{ needs.verify-tag.outputs.tag_name }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          # updater 使用 GitHub latest 端点；beta 也必须作为普通 Release 才能被 latest.json 发现。
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          tauriScript: bun run tauri
          args: ${{ matrix.platform.args }} --config '{"version":"${{ needs.verify-tag.outputs.app_version }}"}'
