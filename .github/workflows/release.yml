name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
      app_version: ${{ steps.release_tag.outputs.app_version }}
      tauri_config: ${{ steps.release_tag.outputs.tauri_config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install release script dependencies
        run: bun install --frozen-lockfile

      - name: Resolve tag name
        id: release_tag
        run: bun run release:version

      - name: Ensure tag is on main
        shell: bash
        run: |
          # 只允许 main 历史上的 v* tag 发布，避免临时分支误触发 Release。
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-tauri:
    name: Build ${{ matrix.platform.name }}
    needs: verify-tag
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-15
            args: ""
          - name: Linux
            runner: ubuntu-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-latest'
        shell: bash
        run: |
          # Tauri Linux 打包依赖 WebKitGTK、AppIndicator 和基础构建工具。
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          # 缓存 Bun 下载包，node_modules 仍由 lockfile 重新展开，避免跨平台产物污染。
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # 缓存 Cargo registry/git 与 Tauri release target，显著减少重复 tag 构建时间。
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.verify-tag.outputs.tag_name }}
          releaseName: Encode Lab ${{ needs.verify-tag.outputs.tag_name }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          # updater 使用 GitHub latest 端点；beta 也必须作为普通 Release 才能被 latest.json 发现。
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          tauriScript: bun run tauri
          args: ${{ matrix.platform.args }} --config '${{ needs.verify-tag.outputs.tauri_config }}'

  verify-updater-release:
    name: Verify updater release assets
    needs: [verify-tag, build-tauri]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Stop when build failed
        if: needs.build-tauri.result != 'success'
        run: |
          # 构建失败时不能继续检查，避免把半成品误判为可更新版本。
          echo "build-tauri result: ${{ needs.build-tauri.result }}"
          exit 1

      - name: Verify updater manifest and signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.verify-tag.outputs.tag_name }}
          APP_VERSION: ${{ needs.verify-tag.outputs.app_version }}
        shell: bash
        run: |
          # latest.json 是客户端固定访问的更新清单，缺失会导致更新检测直接失败。
          asset_names="$(gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          echo "$asset_names"

          if ! grep -Fxq "latest.json" <<< "$asset_names"; then
            echo "::error::Release $TAG_NAME is missing latest.json for Tauri updater"
            exit 1
          fi

          # .sig 是 latest.json 中 signature 字段的来源，缺失说明安装包没有可校验签名。
          signature_count="$(grep -Ec '\.sig$' <<< "$asset_names" || true)"
          if [[ "$signature_count" -eq 0 ]]; then
            echo "::error::Release $TAG_NAME is missing updater signature assets"
            exit 1
          fi

          # updater 客户端不会携带 GitHub 登录态，必须验证公开端点能匿名返回 JSON。
          curl -LfsS "https://github.com/$GITHUB_REPOSITORY/releases/latest/download/latest.json" >/tmp/latest.json
          jq -e --arg version "$APP_VERSION" --arg repo "$GITHUB_REPOSITORY" --arg tag "$TAG_NAME" '
            .version == $version
            and (.platforms | type == "object")
            and (.platforms | length > 0)
            and ([.platforms[] | (.signature | type == "string" and length > 0)] | all)
            and ([.platforms[] | (.url | startswith("https://github.com/" + $repo + "/releases/download/" + $tag + "/"))] | all)
          ' /tmp/latest.json >/dev/null

          failed=0
          while read -r url; do
            # 清单中的安装包 URL 也必须匿名可访问，否则客户端拿到清单后仍会安装失败。
            if ! curl --retry 5 --retry-delay 10 --retry-all-errors -LfsS --head "$url" >/dev/null; then
              echo "::error::Updater asset URL is not anonymously accessible: $url"
              failed=1
            fi
          done < <(jq -r '.platforms[].url' /tmp/latest.json | sort -u)

          exit "$failed"
