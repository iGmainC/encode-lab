name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_MIRROR_REPO: iGmainC/encode-lab-releases

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_tag.outputs.tag_name }}
      app_version: ${{ steps.release_tag.outputs.app_version }}
      tauri_config: ${{ steps.release_tag.outputs.tauri_config }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install release script dependencies
        run: bun install --frozen-lockfile

      - name: Resolve tag name
        id: release_tag
        run: bun run release:version

      - name: Ensure tag is on main
        shell: bash
        run: |
          # 只允许 main 历史上的 v* tag 发布，避免临时分支误触发 Release。
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

  build-tauri:
    name: Build ${{ matrix.platform.name }}
    needs: verify-tag
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
            args: ""
          - name: Windows
            runner: windows-latest
            args: "--bundles nsis"
          - name: Linux
            runner: ubuntu-latest
            args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform.runner == 'ubuntu-latest'
        shell: bash
        run: |
          # Tauri Linux 打包依赖 WebKitGTK、AppIndicator 和基础构建工具。
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          # 缓存 Bun 下载包，node_modules 仍由 lockfile 重新展开，避免跨平台产物污染。
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # 缓存 Cargo registry/git 与 Tauri release target，显著减少重复 tag 构建时间。
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.verify-tag.outputs.tag_name }}
          releaseName: Encode Lab ${{ needs.verify-tag.outputs.tag_name }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          # updater 使用 GitHub latest 端点；beta 也必须作为普通 Release 才能被 latest.json 发现。
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          tauriScript: bun run tauri
          args: ${{ matrix.platform.args }} --config '${{ needs.verify-tag.outputs.tauri_config }}'

  publish-updater-mirror:
    name: Publish updater mirror
    needs: [verify-tag, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Mirror updater artifacts to public release repository
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN }}
          TAG_NAME: ${{ needs.verify-tag.outputs.tag_name }}
        shell: bash
        run: |
          # 主仓库保持私有，客户端只访问公开 mirror 仓库中的 updater 资产。
          mkdir -p /tmp/updater-assets
          gh release download "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --dir /tmp/updater-assets

          # Tauri 生成的 latest.json 默认指向主仓库，需要改写为公开 mirror 下载地址。
          jq \
            --arg source "https://github.com/$GITHUB_REPOSITORY/releases/download/" \
            --arg mirror "https://github.com/$RELEASE_MIRROR_REPO/releases/download/" \
            '(.platforms[]?.url) |= gsub($source; $mirror)' \
            /tmp/updater-assets/latest.json > /tmp/updater-assets/latest.mirror.json
          mv /tmp/updater-assets/latest.mirror.json /tmp/updater-assets/latest.json

          if gh release view "$TAG_NAME" --repo "$RELEASE_MIRROR_REPO" >/dev/null 2>&1; then
            gh release delete "$TAG_NAME" --repo "$RELEASE_MIRROR_REPO" --yes
          fi

          gh release create "$TAG_NAME" /tmp/updater-assets/* \
            --repo "$RELEASE_MIRROR_REPO" \
            --title "Encode Lab $TAG_NAME" \
            --notes "Public updater artifacts mirrored from $GITHUB_REPOSITORY $TAG_NAME." \
            --latest

  verify-updater-release:
    name: Verify updater release assets
    needs: [verify-tag, build-tauri, publish-updater-mirror]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Stop when build or mirror failed
        if: needs.build-tauri.result != 'success' || needs.publish-updater-mirror.result != 'success'
        run: |
          # 构建或公开 mirror 失败时不能继续检查，避免把半成品误判为可更新版本。
          echo "build-tauri result: ${{ needs.build-tauri.result }}"
          echo "publish-updater-mirror result: ${{ needs.publish-updater-mirror.result }}"
          exit 1

      - name: Verify updater manifest and signatures
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIRROR_TOKEN }}
          TAG_NAME: ${{ needs.verify-tag.outputs.tag_name }}
        shell: bash
        run: |
          # latest.json 是客户端固定访问的更新清单，缺失会导致更新检测直接失败。
          asset_names="$(gh release view "$TAG_NAME" --repo "$RELEASE_MIRROR_REPO" --json assets --jq '.assets[].name')"
          echo "$asset_names"

          if ! grep -Fxq "latest.json" <<< "$asset_names"; then
            echo "::error::Release $TAG_NAME is missing latest.json for Tauri updater"
            exit 1
          fi

          # .sig 是 latest.json 中 signature 字段的来源，缺失说明安装包没有可校验签名。
          signature_count="$(grep -Ec '\.sig$' <<< "$asset_names" || true)"
          if [[ "$signature_count" -eq 0 ]]; then
            echo "::error::Release $TAG_NAME is missing updater signature assets"
            exit 1
          fi

          # updater 客户端不会携带 GitHub 登录态，必须验证公开端点能匿名返回 JSON。
          curl -LfsS "https://github.com/$RELEASE_MIRROR_REPO/releases/latest/download/latest.json" >/tmp/latest.json
          jq -e '.version and .platforms and (.platforms | length > 0)' /tmp/latest.json >/dev/null
